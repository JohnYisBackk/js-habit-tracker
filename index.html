<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Habit Tracker</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Habit Tracker 💪</h1>

      <div class="add-row">
        <input
          type="text"
          class="input-tracker"
          id="inputTracker"
          placeholder="Type a habit..."
        />
        <button class="add-btn" id="addBtn">Add</button>
        <button class="del-all-btn" id="delAllBtn">Delete All</button>
      </div>

      <div class="habit-list" id="habitList"></div>

      <div class="footer">
        <div class="progress-text" id="progressText">0/0 done</div>
        <button class="new-day" id="newDayBtn">New Day</button>
      </div>
    </div>
  </body>
</html>
